<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoldenBoyAI — YugeAI Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Source+Sans+3:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
  <style>
    :root {
      --bg: #0c0a06;
      --card: rgba(28, 22, 12, 0.95);
      --border: #4a3c22;
      --text: #f0e6d2;
      --muted: #a89870;
      --gold: #d4af37;
      --gold-dim: #b8962e;
      --gradient: linear-gradient(135deg, #d4af37 0%, #a67c00 50%, #8b6914 100%);
      --radius: 12px;
      --font-display: 'Cinzel', Georgia, serif;
      --font-body: 'Source Sans 3', system-ui, sans-serif;
      --font-mono: 'Space Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-body);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 70% 40% at 50% -10%, rgba(212, 175, 55, 0.12), transparent),
        radial-gradient(ellipse 50% 30% at 80% 60%, rgba(74, 60, 34, 0.35), transparent);
      min-height: 100vh;
      color: var(--text);
      line-height: 1.5;
    }
    .app {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.25rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header { text-align: center; margin-bottom: 2rem; }
    .logo {
      font-family: var(--font-display);
      font-size: 2.25rem;
      font-weight: 700;
      margin: 0 0 0.25rem 0;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .symbol { color: var(--gold); font-size: 1.1rem; margin: 0 0 0.5rem 0; }
    .tagline { color: var(--muted); font-size: 0.9rem; margin: 0; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }
    .card h2 {
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--gold);
      margin: 0 0 0.75rem 0;
      font-weight: 600;
    }
    .stat { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.95rem; }
    .stat:last-child { margin-bottom: 0; }
    .stat span:first-child { color: var(--muted); }
    .stat span:last-child { color: var(--text); font-weight: 600; font-family: var(--font-mono); }
    .address { font-family: var(--font-mono); font-size: 0.8rem; word-break: break-all; color: var(--muted); }
    .in {
      width: 100%;
      padding: 0.6rem 0.75rem;
      background: rgba(12, 10, 6, 0.8);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
    }
    .in::placeholder { color: var(--muted); }
    .btn {
      display: inline-block;
      padding: 0.7rem 1.5rem;
      background: var(--gradient);
      border: none;
      border-radius: 8px;
      color: #0c0a06;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: inherit;
      transition: filter 0.2s, transform 0.1s;
    }
    .btn:hover { filter: brightness(1.1); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      margin-left: 0.5rem;
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; border-bottom: 1px solid var(--border); margin-bottom: 0.75rem; }
    .tab {
      background: none;
      border: none;
      color: var(--muted);
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
    }
    .tab:hover { color: var(--gold); }
    .tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
    .panel { display: none; }
    .panel.active { display: block; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th, td { font-family: var(--font-mono); border-bottom: 1px solid var(--border); padding: 0.5rem 0.4rem; }
    th { color: var(--muted); text-align: left; }
    #status { font-family: var(--font-mono); font-size: 0.8rem; color: var(--muted); margin-top: 0.5rem; }
    .footer { text-align: center; margin-top: auto; padding-top: 2rem; color: var(--muted); font-size: 0.8rem; }
    .footer p { margin: 0 0 0.25rem 0; }
    label { display: block; color: var(--muted); font-size: 0.85rem; margin-bottom: 0.35rem; }
    .row { margin-bottom: 0.75rem; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 560px) { .grid2 { grid-template-columns: 1fr; } }
    .muted { color: var(--muted); }
    .gold { color: var(--gold); }
    .card-h3 { font-size: 0.9rem; color: var(--gold-dim); margin: 0 0 0.5rem 0; }
    .lookup-row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.5rem; }
    .lookup-row input { flex: 1; min-width: 80px; }
    .small { font-size: 0.75rem; }
    #covfefeKey { font-family: var(--font-mono); }
    #claimIndex { width: 120px; }
    .result-box { background: rgba(12,10,6,0.6); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem; font-family: var(--font-mono); font-size: 0.8rem; margin-top: 0.5rem; }
    .result-box pre { margin: 0; white-space: pre-wrap; word-break: break-all; }
    .panel-section { margin-bottom: 1rem; }
    .panel-section:last-child { margin-bottom: 0; }
    .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.85rem; }
    .tbl-wrap { overflow-x: auto; }
    .tbl-wrap table { min-width: 400px; }
    .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; }
    .badge-yes { background: rgba(212,175,55,0.2); color: var(--gold); }
    .badge-no { background: rgba(74,60,34,0.5); color: var(--muted); }
    .header-sub { font-size: 0.85rem; color: var(--muted); margin-top: 0.25rem; }
    .divider { height: 1px; background: var(--border); margin: 1rem 0; }
    .help { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mb-1 { margin-bottom: 0.5rem; }
    .mb-2 { margin-bottom: 1rem; }
    .p-1 { padding: 0.5rem; }
    .text-center { text-align: center; }
    .text-right { text-align: right; }
    .w-full { width: 100%; }
    .opacity-8 { opacity: 0.8; }
    .rounded { border-radius: var(--radius); }
    .border { border: 1px solid var(--border); }
    .bg-dark { background: rgba(12,10,6,0.9); }
    .cursor-pointer { cursor: pointer; }
    .no-select { user-select: none; }
    .transition { transition: all 0.2s ease; }
    .hover-gold:hover { color: var(--gold); }
    .min-h-200 { min-height: 200px; }
    .max-w-600 { max-width: 600px; }
    .mx-auto { margin-left: auto; margin-right: auto; }
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-1 { gap: 0.5rem; }
    .gap-2 { gap: 1rem; }
    .hidden { display: none !important; }
    .block { display: block; }
    .inline-block { display: inline-block; }
    @media (max-width: 720px) {
      .app { padding: 1rem 0.75rem; }
      .logo { font-size: 1.75rem; }
      .card { padding: 1rem; }
      .btn { padding: 0.6rem 1.2rem; font-size: 0.9rem; }
      .stat { font-size: 0.9rem; }
      th, td { font-size: 0.75rem; padding: 0.4rem; }
    }
    @media (max-width: 480px) {
      .logo { font-size: 1.5rem; }
      .tabs { flex-direction: column; }
      .tab { width: 100%; text-align: left; }
      .lookup-row { flex-direction: column; align-items: stretch; }
    }
    @media (prefers-color-scheme: light) {
      body { --bg: #1a1612; --card: rgba(36,30,20,0.95); --border: #5a4c32; --text: #e8e0d0; --muted: #908070; }
    }
    .card-title { font-family: var(--font-display); font-size: 1.1rem; color: var(--gold); margin-bottom: 0.75rem; }
    .list-plain { list-style: none; padding: 0; margin: 0; }
    .list-plain li { padding: 0.35rem 0; border-bottom: 1px solid var(--border); }
    .list-plain li:last-child { border-bottom: none; }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .break-all { word-break: break-all; }
    .font-mono { font-family: var(--font-mono); }
    .text-sm { font-size: 0.85rem; }
    .text-xs { font-size: 0.75rem; }
    .font-bold { font-weight: 700; }
    .leading-relaxed { line-height: 1.6; }
    .section-note { font-size: 0.75rem; color: var(--muted); margin-top: 0.5rem; padding: 0.5rem; background: rgba(0,0,0,0.2); border-radius: 6px; }
    .gold-bar { height: 3px; background: var(--gradient); border-radius: 2px; margin: 0.5rem 0; }
    .card-footer { margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--muted); }
    .input-group { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
    .input-group .in { flex: 1; }
    .btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .stat-row { padding: 0.4rem 0; border-bottom: 1px solid rgba(74,60,34,0.5); }
    .stat-row:last-child { border-bottom: none; }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .empty-state { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.9rem; }
    .loading { opacity: 0.7; pointer-events: none; }
    .error-text { color: #c94a4a; font-size: 0.85rem; }
    .success-text { color: #4a8f5a; font-size: 0.85rem; }
    .badge { display: inline-block; padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
    .badge-gold { background: rgba(212,175,55,0.25); color: var(--gold); }
    .badge-muted { background: rgba(168,152,112,0.2); color: var(--muted); }
    .link { color: var(--gold); text-decoration: none; }
    .link:hover { text-decoration: underline; }
    .mono { font-family: var(--font-mono); }
    .uppercase { text-transform: uppercase; letter-spacing: 0.05em; }
    .tracking-wide { letter-spacing: 0.05em; }
    .shadow-sm { box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
    .border-gold { border-color: var(--gold); }
    .bg-card { background: var(--card); }
    .text-gold { color: var(--gold); }
    .text-muted { color: var(--muted); }
    .text-white { color: var(--text); }
    .fs-sm { font-size: 0.85rem; }
    .fs-xs { font-size: 0.75rem; }
    .fw-6 { font-weight: 600; }
    .fw-7 { font-weight: 700; }
    .rounded-sm { border-radius: 6px; }
    .rounded-lg { border-radius: 16px; }
    .p-2 { padding: 1rem; }
    .m-0 { margin: 0; }
    .mt-3 { margin-top: 1.5rem; }
    .mb-3 { margin-bottom: 1.5rem; }
    .px-1 { padding-left: 0.5rem; padding-right: 0.5rem; }
    .py-1 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
    .d-flex { display: flex; }
    .d-block { display: block; }
    .d-none { display: none; }
    .align-center { align-items: center; }
    .justify-center { justify-content: center; }
    .flex-wrap { flex-wrap: wrap; }
    .w-100 { width: 100%; }
    .h-auto { height: auto; }
    .overflow-auto { overflow: auto; }
    .position-relative { position: relative; }
    .position-absolute { position: absolute; }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">GoldenBoyAI</h1>
      <p class="symbol">YugeAI Dashboard</p>
      <p class="tagline">Big-league grabs, deals, covfefe &amp; golden epochs</p>
    </header>

    <main class="main">
      <section class="card">
        <h2>Contract</h2>
        <div class="row">
          <label for="contractAddr">YugeAI contract address</label>
          <input id="contractAddr" class="in" type="text" placeholder="0x..." />
        </div>
        <div class="row">
          <button type="button" id="connectBtn" class="btn">Connect wallet</button>
          <button type="button" id="refreshBtn" class="btn btn-outline">Refresh</button>
        </div>
        <p id="status">Enter contract address and connect.</p>
      </section>

      <section class="card">
        <h2>Stats</h2>
        <div class="stat"><span>Grabs</span><span id="statGrabs">—</span></div>
        <div class="stat"><span>Deals</span><span id="statDeals">—</span></div>
        <div class="stat"><span>Slots</span><span id="statSlots">—</span></div>
        <div class="stat"><span>Total swept (wei)</span><span id="statSwept">—</span></div>
        <div class="stat"><span>Vault balance (wei)</span><span id="statVault">—</span></div>
        <div class="stat"><span>Current epoch</span><span id="statEpoch">—</span></div>
        <div class="stat"><span>Paused</span><span id="statPaused">—</span></div>
      </section>
